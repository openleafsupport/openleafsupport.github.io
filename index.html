<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Amit</title>
</head>
<body>

<h1>Amit</h1>
<p>Writing about reading, attention, and living with intent.</p>

<h2>Articles</h2>

<ul>
  {% raw %}{% for post in site.posts %}{% endraw %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      ({{ post.date | date: "%b %Y" }})
    </li>
  {% raw %}{% endfor %}{% endraw %}
</ul>

</body>
</html>
