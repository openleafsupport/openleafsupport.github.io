<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="Amit" />

  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:image" content="{{ site.url }}/og_image.png" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:locale" content="en_US" />
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
  <meta property="article:author" content="Amit" />
  {% endif %}

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  <meta name="twitter:image" content="{{ site.url }}/og_image.png" />

  <script>
    (function () {
      var mode = 'system';
      try {
        mode = localStorage.getItem('theme_mode') || 'system';
      } catch (error) {}

      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var resolved = mode === 'dark' ? 'dark' : mode === 'light' ? 'light' : (prefersDark ? 'dark' : 'light');
      var root = document.documentElement;
      root.setAttribute('data-theme-mode', mode);
      root.setAttribute('data-theme', resolved);
      root.style.colorScheme = resolved;
    })();
  </script>

  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: site.description | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "Amit"
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }},
      "url": {{ site.url | jsonify }}
    },
    "url": {{ site.url | append: page.url | jsonify }},
    "image": {{ site.url | append: "/og_image.png" | jsonify }},
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": {{ site.url | append: page.url | jsonify }}
    }
  }
  </script>
  {% else %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "description": {{ site.description | jsonify }},
    "url": {{ site.url | jsonify }}
  }
  </script>
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
</head>
<body class="{% if page.layout == 'post' %}page-post{% else %}page-standard{% endif %}">

<nav class="site-nav">
  <div class="wrap">
    <a class="nav-brand" href="{{ '/' | relative_url }}">OpenLeaf</a>
    <div class="nav-meta">
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Writing</a>
        <a href="{{ '/' | relative_url }}#about">About</a>
      </div>
      <div class="theme-switcher" role="group" aria-label="Theme control">
        <button class="theme-button" type="button" data-theme-control="light" aria-pressed="false">Light</button>
        <button class="theme-button" type="button" data-theme-control="dark" aria-pressed="false">Dark</button>
        <button class="theme-button" type="button" data-theme-control="system" aria-pressed="false">System</button>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="wrap">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <p>OpenLeaf &mdash; Writing on reading, attention, and deliberate living.</p>
    <p class="footer-signoff">Written by <a href="{{ '/' | relative_url }}#about">Amit</a></p>
  </div>
</footer>

<script src="{{ '/assets/theme.js' | relative_url }}" defer></script>
</body>
</html>
