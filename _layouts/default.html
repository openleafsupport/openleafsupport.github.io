<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="Amit" />

  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:image" content="{{ site.url }}/og_image.png" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:locale" content="en_US" />
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
  <meta property="article:author" content="Amit" />
  {% endif %}

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  <meta name="twitter:image" content="{{ site.url }}/og_image.png" />

  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: site.description | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "Amit"
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }},
      "url": {{ site.url | jsonify }}
    },
    "url": {{ site.url | append: page.url | jsonify }},
    "image": {{ site.url | append: "/og_image.png" | jsonify }},
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": {{ site.url | append: page.url | jsonify }}
    }
  }
  </script>
  {% else %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "description": {{ site.description | jsonify }},
    "url": {{ site.url | jsonify }}
  }
  </script>
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #faf9f7;
      --surface: #ffffff;
      --text:    #1c1c1e;
      --muted:   #6b7280;
      --subtle:  #9ca3af;
      --accent:  #2d6a4f;
      --accent2: #40916c;
      --border:  #e5e7eb;
      --serif:   'Lora', Georgia, serif;
      --sans:    'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent2); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }

    .wrap { max-width: 760px; margin: 0 auto; padding: 0 1.75rem; }

    /* ---- Navigation ---- */
    .site-nav {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0;
      position: sticky;
      top: 0;
      background: rgba(250, 249, 247, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
    }
    .site-nav .wrap { display: flex; justify-content: space-between; align-items: center; }
    .nav-brand {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .nav-brand:hover { text-decoration: none; color: var(--accent); }
    .nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      margin-left: 1.75rem;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--accent); text-decoration: none; }

    /* ---- Hero ---- */
    .hero { padding: 4.5rem 0 3rem; }
    .hero-eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    .hero-desc { font-size: 1.1rem; color: var(--muted); max-width: 500px; line-height: 1.65; }

    /* ---- Posts list (index) ---- */
    .posts-section { padding: 0.5rem 0 5rem; }
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 0;
      padding-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .post-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1.375rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1.5rem;
    }
    .post-item-title {
      font-family: var(--serif);
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .post-item-title:hover { color: var(--accent); text-decoration: none; }
    .post-item-meta { font-size: 0.82rem; color: var(--subtle); white-space: nowrap; flex-shrink: 0; }

    /* ---- Post page ---- */
    .post-wrapper { padding: 3rem 0 5rem; }
    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-weight: 500;
    }
    .post-back:hover { color: var(--accent); text-decoration: none; }
    .post-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .post-title {
      font-family: var(--serif);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    .post-meta { font-size: 0.875rem; color: var(--muted); margin-bottom: 2.5rem; }
    .post-meta span { margin-right: 1.25rem; }
    .post-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 2.5rem; }

    .post-body { font-size: 1.0625rem; }
    .post-body p { margin-bottom: 1.625rem; }
    .post-body h2 {
      font-family: var(--serif);
      font-size: 1.375rem;
      font-weight: 700;
      margin: 3rem 0 1rem;
      color: var(--text);
    }
    .post-body h3 {
      font-family: var(--serif);
      font-size: 1.125rem;
      font-weight: 600;
      margin: 2.25rem 0 0.75rem;
    }
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 0 0.5rem 1.5rem;
      margin: 2rem 0;
      color: var(--muted);
      font-style: italic;
      font-family: var(--serif);
      font-size: 1.125rem;
      line-height: 1.6;
    }
    .post-body ul, .post-body ol { margin: 0 0 1.625rem 1.5rem; }
    .post-body li { margin-bottom: 0.5rem; }
    .post-body strong { font-weight: 600; color: var(--text); }

    /* ---- Footer ---- */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      font-size: 0.82rem;
      color: var(--subtle);
    }
    .site-footer a { color: var(--muted); }
    .site-footer a:hover { color: var(--accent); text-decoration: none; }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .post-item { flex-direction: column; gap: 0.25rem; }
      .post-item-meta { font-size: 0.78rem; }
      .nav-links a:first-child { margin-left: 0; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a class="nav-brand" href="/">OpenLeaf</a>
    <div class="nav-links">
      <a href="/">Writing</a>
      <a href="/#about">About</a>
    </div>
  </div>
</nav>

<main>
  <div class="wrap">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <p>OpenLeaf &mdash; Writing on reading, attention, and deliberate living.</p>
    <p style="margin-top:0.5rem;">Written by <a href="/#about">Amit</a></p>
  </div>
</footer>

</body>
</html>
