  short_bio: Book lover by heart, IT professional by work · Immersive reader · On a mission to grow a stronger reading community for the future
  bio: >
    An IT professional close to 20 years of experience and an immersive reader since childhood -
    somewhere around age eight or nine, when books quietly became a
    lifelong companion. Never counted it for sure but it has to be over 1,500 books read across a life. A proud owner of a personal
    library of 500 books and counting.

    Favourite shelves: mystery, thriller, literary fiction, world
    mythology, history, and the classics.

    Built OpenLeaf anonymously to help more people find their way
    back to books, away from the noise, and toward something quieter and
    more lasting.

