name: Optimize Images

on:
  pull_request:
    paths:
      - 'assets/images/**'
      - '_posts/**.png'
      - '_posts/**.jpg'
      - '_posts/**.jpeg'
      - '_posts/**.webp'
  workflow_dispatch:

jobs:
  compress-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compress changed images
        uses: calibreapp/image-actions@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          jpegQuality: '82'
          pngQuality: '80'
          webpQuality: '82'
          ignorePaths: 'vendor/**,_site/**,.jekyll-cache/**'